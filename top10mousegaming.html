<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Top 10 Mouse Gaming 2025 - Setupzen</title>

<link rel="stylesheet" href="styletop10mouse.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body>

<nav class="glass-nav fixed w-full z-50 top-0 border-b border-gray-100">
<div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

<a href="index.html" class="text-xl font-semibold tracking-tight">
<span class="text-black">Setup</span><span class="text-gray-400">zen</span>
</a>

<div class="flex gap-4">
<a href="index.html" class="nav-btn">Inicio</a>
</div>

</div>
</nav>

<header class="pt-32 pb-16 px-6 bg-white">

<div class="max-w-4xl mx-auto text-center">

<h1 class="text-4xl md:text-6xl font-bold tracking-tighter mb-6">
Top 10 Mouse Gaming <br>
<span class="text-gray-400">Calidad-Precio 2025</span>
</h1>

<p class="text-lg text-gray-500 font-light">
Compara los mejores periféricos del mercado seleccionados por expertos.
</p>

</div>

</header>

<main class="max-w-6xl mx-auto px-6 pb-24">

<div id="compare-section" class="mb-16 bg-gray-50 p-6 rounded-3xl border border-dashed border-gray-300 hidden">

<div class="flex justify-between items-center mb-4">
<h2 class="text-xl font-bold">Comparador de Periféricos</h2>
<button onclick="closeCompare()" class="text-gray-400 hover:text-black">Cerrar</button>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center">

<div id="compare-slot-1" class="bg-white p-4 rounded-xl border border-gray-200 text-center text-sm text-gray-400">
Selecciona el primer ratón
</div>

<div class="text-center font-bold text-gray-300">VS</div>

<div id="compare-slot-2" class="bg-white p-4 rounded-xl border border-gray-200 text-center text-sm text-gray-400">
Selecciona el segundo ratón
</div>

</div>

<button id="run-compare-btn" disabled onclick="generateAIComparison()" class="w-full mt-4 bg-black text-white py-3 rounded-xl font-bold opacity-50 cursor-not-allowed hover:bg-gray-800 transition">
Generar Comparativa
</button>

<div id="compare-result" class="mt-6 text-sm text-gray-700 leading-relaxed hidden"></div>

</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-8" id="mouse-list"></div>

</main>

<footer class="bg-gray-50 py-12 border-t border-gray-100">

<div class="text-center text-gray-400 text-xs px-6">
<p>&copy; 2026 Setupzen. Recomendaciones honestas para tu setup gaming</p>
</div>

</footer>

<script src="top10mouse.js"></script>

</html>
